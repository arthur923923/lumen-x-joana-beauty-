<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agenda</title>
    <link rel="stylesheet" href="./agenda.css">
</head>

<body>
    <header>
        <div class="joa">
            <img src="./imagens/ChatGPT Image 19 de jun. de 2026, 20_12_40.png" alt="Logo">
        </div>
        <nav>
    <a href="./index.html">Início</a>
     <a href="./sobre.html">Sobre</a>
    <a href="./serviços.html">Serviços</a>
    <a href="./agenda.html">Agenda</a>
     </nav>
    </header>
    <main>
        <div class="banner"></div>

<section class="titulo">
    <h1>Agende seu horário</h1>
    <p>Preencha os dados abaixo e solicite seu atendimento.</p>
</section>

<div class="container">

    <div class="formulario">

        <h2>Dados para agendamento</h2>

        <div class="grupo">
            <div class="campo">
                <label>Nome Completo</label>
                <input type="text">
            </div>
            <div class="campo">
                <label>WhatsApp</label>
                <input type="tel">
            </div>
        </div>
        <div class="grupo">
            <div class="campo">
                <label>Data desejada</label>
                <input type="date">
            </div>
            <div class="campo">
                <label>Horário desejado</label>
                <input type="time">
            </div>
        </div>
        <div class="grupo">
            <div class="campo">
                <label>Serviço</label>
                <select>
                    <option>Corte Feminino</option>
                    <option>Corte Masculino</option>
                    <option>Escova</option>
                    <option>Coloração</option>
                    <option>Manicure</option>
                    <option>Pedicure</option>
                    <option>Barba</option>
                </select>
            </div>
        </div>
        <div class="campo">
            <label>Observações</label>
            <textarea placeholder="Digite alguma observação..."></textarea>
        </div>
        <br>
        <div class="botao">
            <button>Solicitar Agendamento</button>
        </div>
    </div>
    <div class="info">
        <h3>📍 Endereço</h3>
        <p>
            Rua Exemplo, 123 - Centro<br>
            São Paulo - SP
        </p>
        <br>
        <h3>📞 Contato</h3>
        <p>
            (11) 99999-9999
        </p>
    </div>
</div>

    </main>
    
</body>

</html>
